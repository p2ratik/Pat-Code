[mcp_servers.eraser]
url = "https://app.eraser.io/api/mcp"
transport = "streamable-http"
startup_timeout_sec = 120  # OAuth browser flow needs time — do not set below 60
enabled = false

[mcp_servers.eraser.oauth]
# Leave client_id / client_secret empty — fastmcp does full discovery
