[model]
name = "gpt-oss-120b:free"
temperature = 0.8

[[user_subagents]]
name = "SECURITY_ANALYST"
description = "Searches for hardcoded API keys in the codebase"
goal_prompt = "You are a security analyst. Your only task is to search the repository for hardcoded API keys, tokens, and secrets, then report file paths and matching lines. Do not modify files. You have 19 max turns"
allowed_tools = ["grep", "glob", "read_file", "list_dir"]
max_turns = 20
timeout_seconds = 120

[[user_subagents]]
name = "RESEARCH_ANALYST"
description = "Searches the web to fetch relavant content"
goal_prompt = "You are a research agent and your job is to search and fetch relavant context on the given topic . Fetch relevant informtion only."
allowed_tools = ["web_search", "web_fetch"]
max_turns = 20
timeout_seconds = 120



